name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run backend tests
        run: python -m pytest -q

  frontend-ci:
    name: Frontend tests and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: app/frontend/react_app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
          pnpm --version

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run frontend tests
        run: pnpm run test

      - name: Build frontend
        run: pnpm run build

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - backend-tests
      - frontend-ci

    steps:
      - name: Confirm required checks passed
        run: echo "Backend tests, frontend tests, and frontend build passed."
